<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena Analyst</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2e2e42;
    --accent: #00ff88;
    --accent2: #ff4466;
    --blue: #5599ff;
    --red: #ff5577;
    --text: #ffffff;
    --muted: #8888aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 1.5rem; }

  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .logo span { color: var(--text); }

  .setup { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 0.75rem; align-items: end; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-family: 'Space Mono', monospace; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 22px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .filters-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: none; }
  .filters-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 0.75rem; }
  .filters-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0.5rem; margin-bottom: 0.75rem; }
  .filter-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; font-family: 'Space Mono', monospace; text-align: center; }
  .filter-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; outline: none; text-align: center; }
  .filter-field input:focus { border-color: var(--accent); }

  .search-row { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; }
  .search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px; outline: none; width: 260px; }
  .search-input:focus { border-color: var(--accent); }
  .class-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 11px; color: var(--muted); font-size: 12px; font-family: 'Space Mono', monospace; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }

  .status-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; margin-bottom: 0.75rem; font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); display: none; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .dot.done { background: var(--accent); }
  .dot.error { background: var(--accent2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .rate-info { margin-left: auto; font-size: 11px; }

  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: none; }
  .progress-bar-bg { background: var(--surface2); border-radius: 4px; height: 5px; margin-top: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .progress-text { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }

  .summary-bar { display: none; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .summary-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
  .summary-chip span { color: var(--text); font-weight: 700; font-size: 14px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); display: none; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface); position: sticky; top: 0; z-index: 10; }
  th { padding: 11px 14px; text-align: left; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  .th-blue { color: var(--blue) !important; }
  .th-red { color: var(--red) !important; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.warning td:first-child::after { content: ' ⚠'; color: #ffb400; font-size: 11px; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 11px 14px; white-space: nowrap; }
  .champion-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .class-badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-family: 'Space Mono', monospace; font-weight: 700; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .class-badge.Bruiser { background: rgba(255,102,68,0.2); color: #ff7755; border-color: rgba(255,102,68,0.4); }
  .class-badge.Striker { background: rgba(68,170,255,0.2); color: #55aaff; border-color: rgba(68,170,255,0.4); }
  .class-badge.Defender { background: rgba(100,200,100,0.2); color: #77dd77; border-color: rgba(100,200,100,0.4); }
  .class-badge.Sprinter { background: rgba(255,200,50,0.2); color: #ffcc44; border-color: rgba(255,200,50,0.4); }
  .class-badge.Grinder { background: rgba(180,100,255,0.2); color: #cc77ff; border-color: rgba(180,100,255,0.4); }
  .class-badge.Support { background: rgba(255,180,50,0.2); color: #ffbb44; border-color: rgba(255,180,50,0.4); }
  .class-badge.Forward,.class-badge.Anchor,.class-badge.Center,.class-badge.Flanker { background: rgba(180,180,220,0.15); color: #bbbbdd; border-color: rgba(180,180,220,0.3); }
  .num { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }
  .num.blue { color: var(--blue); }
  .num.red { color: var(--red); }
  .num.zero { color: var(--border); }
  .col-group-blue { border-left: 2px solid rgba(85,153,255,0.4); }
  .col-group-red { border-left: 2px solid rgba(255,85,119,0.4); }
  .col-group-blue2 { border-left: 1px solid rgba(85,153,255,0.2); }
  .col-group-red2 { border-left: 1px solid rgba(255,85,119,0.2); }
  .empty { text-align: center; padding: 4rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; display: none; }
  .fav-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 6px; opacity: 0.3; transition: opacity 0.2s; }
  .fav-btn.active { opacity: 1; }
  .tabs { display: none; gap: 0.5rem; margin-bottom: 0.75rem; }
  .tab-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 18px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); cursor: pointer; }
  .tab-btn.active { border-color: var(--accent); color: var(--accent); }
  .champ-row { display: flex; align-items: center; gap: 8px; }

  /* MODAL */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 100; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 2rem 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 900px; padding: 1.5rem; position: relative; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px 10px; }
  .modal-close:hover { color: var(--text); }
  .match-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
  .match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .match-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .match-score { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
  .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.75rem; align-items: center; }
  .match-vs { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; }
  .team { display: flex; flex-direction: column; gap: 0.4rem; }
  .team.enemy { align-items: flex-end; }
  .moki-row { display: flex; align-items: center; gap: 0.5rem; }
  .moki-row.enemy { flex-direction: row-reverse; }
  .moki-img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .moki-info { display: flex; flex-direction: column; gap: 2px; }
  .moki-info.enemy { align-items: flex-end; }
  .moki-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .moki-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .moki-meta.enemy { justify-content: flex-end; }
  .moki-avg { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .role-badge { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
  .role-K { background: rgba(255,85,119,0.2); color: #ff5577; border: 1px solid rgba(255,85,119,0.4); }
  .role-B { background: rgba(85,153,255,0.2); color: #5599ff; border: 1px solid rgba(85,153,255,0.4); }
  .role-N { background: rgba(136,136,170,0.15); color: var(--muted); border: 1px solid var(--border); }
  .team-count { font-family: 'Space Mono', monospace; font-size: 12px; margin-top: 6px; }
  .team-count.ally { color: var(--blue); }
  .team-count.enemy-c { color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">GRAND<span>ARENA</span> <span style="color:var(--muted);font-size:0.9rem;font-weight:400">analyst</span></div>
</div>

<div class="setup">
  <div class="field">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="ga_xxxxxxxxxxxxxxxx" />
  </div>
  <div class="field">
    <label>Contest ID</label>
    <input type="text" id="contestId" placeholder="69e5e8bbf5706e68ae6c16ed" />
  </div>
  <button class="btn" id="loadBtn" onclick="loadData()">Analisar</button>
  <button class="btn-secondary" onclick="saveKey()">Salvar Key</button>
</div>

<div id="statusBar" class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span id="statusText"></span>
  <span class="rate-info" id="rateInfo"></span>
</div>

<div id="progressWrap" class="progress-wrap">
  <div class="progress-text" id="progressText"></div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div id="summaryBar" class="summary-bar"></div>

<div id="filtersSection" class="filters-section">
  <div class="filters-title">Filtros mínimos</div>
  <div class="filters-grid">
    <div class="filter-field"><label>B🔵 min</label><input type="number" id="f-gBlue" min="0" max="10" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>K🔵 min</label><input type="number" id="f-kBlue" min="0" max="10" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>B🔴 min</label><input type="number" id="f-gRed" min="0" max="10" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>K🔴 min</label><input type="number" id="f-kRed" min="0" max="10" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>BB🔵 min</label><input type="number" id="f-ggBlue" min="0" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>KK🔵 min</label><input type="number" id="f-kkBlue" min="0" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>BB🔴 min</label><input type="number" id="f-ggRed" min="0" placeholder="—" oninput="renderTable()"></div>
    <div class="filter-field"><label>KK🔴 min</label><input type="number" id="f-kkRed" min="0" placeholder="—" oninput="renderTable()"></div>
  </div>
  <div class="search-row">
    <input type="text" class="search-input" id="searchName" placeholder="Buscar champion..." oninput="renderTable()">
    <div class="class-filters" id="classFilters"></div>
  </div>
</div>

<div id="tabsBar" class="tabs">
  <button class="tab-btn active" id="tab-all" onclick="setTab('all')">Todos</button>
  <button class="tab-btn" id="tab-favs" onclick="setTab('favs')">⭐ Favoritos</button>
  <button class="tab-btn" onclick="resetFavs()" style="margin-left:auto;color:var(--muted)">Resetar Favs</button>
</div>
<div id="tableWrap" class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:36px;cursor:default"></th>
        <th onclick="sortBy('name')">Champion <span id="arr-name"></span></th>
        <th onclick="sortBy('class')">Classe <span id="arr-class"></span></th>
        <th class="col-group-blue th-blue" onclick="sortBy('gBlue')">B🔵 <span id="arr-gBlue"></span></th>
        <th class="col-group-blue2 th-blue" onclick="sortBy('kBlue')">K🔵 <span id="arr-kBlue"></span></th>
        <th class="col-group-red th-red" onclick="sortBy('gRed')">B🔴 <span id="arr-gRed"></span></th>
        <th class="col-group-red2 th-red" onclick="sortBy('kRed')">K🔴 <span id="arr-kRed"></span></th>
        <th class="col-group-blue th-blue" onclick="sortBy('ggBlue')">BB🔵 <span id="arr-ggBlue"></span></th>
        <th class="col-group-blue2 th-blue" onclick="sortBy('kkBlue')">KK🔵 <span id="arr-kkBlue"></span></th>
        <th class="col-group-red th-red" onclick="sortBy('ggRed')">BB🔴 <span id="arr-ggRed"></span></th>
        <th class="col-group-red2 th-red" onclick="sortBy('kkRed')">KK🔴 <span id="arr-kkRed"></span></th>
        <th onclick="sortBy('matches')" style="color:var(--muted)">Pts <span id="arr-matches"></span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div id="emptyMsg" class="empty">Nenhum champion encontrado com esses filtros.</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const PROXY = 'https://toolproxy.aikazamage.workers.dev';
const CLASSES = ['Striker','Defender','Bruiser','Sprinter','Grinder','Support','Forward','Anchor','Center','Flanker'];
const GENERALISTAS = ['Forward','Anchor','Center','Flanker'];

let allRows = [];
let champMatchesData = {}; // champion tokenId -> match list with classifications
let sortCol = 'kkRed';
let sortDir = -1;
let filterClass = 'all';
let activeTab = 'all';
let favorites = new Set();
const cache = {};

window.onload = () => {
  const saved = localStorage.getItem('ga_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
  buildClassFilters();
};

function loadFavs() {
  const contestId = getContestId();
  const key = 'ga_favs_' + contestId;
  try {
    const raw = localStorage.getItem(key);
    favorites = raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { favorites = new Set(); }
}

function saveFavs() {
  const contestId = getContestId();
  const key = 'ga_favs_' + contestId;
  try { localStorage.setItem(key, JSON.stringify([...favorites])); } catch(e) {}
}

function toggleFav(champTokenId, e) {
  e.stopPropagation();
  if (favorites.has(champTokenId)) favorites.delete(champTokenId);
  else favorites.add(champTokenId);
  saveFavs();
  renderTable();
}

function resetFavs() {
  if (!confirm('Resetar todos os favoritos deste contest?')) return;
  const contestId = getContestId();
  localStorage.removeItem('ga_favs_' + contestId);
  favorites = new Set();
  renderTable();
}

function setTab(tab) {
  activeTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-favs').classList.toggle('active', tab === 'favs');
  renderTable();
}

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) { localStorage.setItem('ga_api_key', k); alert('API Key salva!'); }
}

function buildClassFilters() {
  const div = document.getElementById('classFilters');
  div.innerHTML = '<span style="font-size:11px;color:var(--muted);font-family:Space Mono,monospace;margin-right:4px">CLASSE:</span>';
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'Todos';
  all.onclick = () => setClassFilter('all', all);
  div.appendChild(all);
  CLASSES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c;
    btn.onclick = () => setClassFilter(c, btn);
    div.appendChild(btn);
  });
}

function setClassFilter(cls, btn) {
  filterClass = cls;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function getApiKey() { return document.getElementById('apiKey').value.trim(); }
function getContestId() { return document.getElementById('contestId').value.trim(); }

function setStatus(msg, state='loading') {
  document.getElementById('statusBar').style.display = 'flex';
  document.getElementById('statusDot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

function setProgress(pct, msg) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = msg;
}

function updateRate(headers) {
  const rem = headers.get('X-RateLimit-Remaining');
  const lim = headers.get('X-RateLimit-Limit');
  if (rem && lim) document.getElementById('rateInfo').textContent = `Rate: ${rem}/${lim}`;
}

async function apiGet(path) {
  if (cache[path]) return cache[path];
  const res = await fetch(`${PROXY}?url=${encodeURIComponent(path)}`, {
    headers: { 'x-api-key': getApiKey() }
  });
  updateRate(res.headers);
  if (!res.ok) throw new Error(`HTTP ${res.status} em ${path}`);
  const data = await res.json();
  cache[path] = data;
  return data;
}

async function fetchAllPages(basePath) {
  const all = [];
  let page = 1;
  let total = Infinity;
  while (all.length < total) {
    const sep = basePath.includes('?') ? '&' : '?';
    const data = await apiGet(`${basePath}${sep}limit=100&page=${page}`);
    const items = data.data || [];
    all.push(...items);
    total = data.pagination?.total ?? all.length;
    if (items.length < 100) break;
    page++;
    if (page > 1) await sleep(200);
  }
  return all;
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loadData() {
  const apiKey = getApiKey();
  const contestId = getContestId();
  if (!apiKey || !contestId) { alert('Preencha a API key e o Contest ID'); return; }

  document.getElementById('loadBtn').disabled = true;
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('filtersSection').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('emptyMsg').style.display = 'none';
  Object.keys(cache).forEach(k => delete cache[k]);
  allRows = [];
  champMatchesData = {};

  try {
    // STEP 1: Contest info
    setStatus('Buscando contest...', 'loading');
    setProgress(5, 'Buscando informações do contest...');
    const contestData = await apiGet(`/contests/${contestId}`);
    const contestInfo = contestData.data || contestData;
    const matchDate = contestInfo.startDate.split('T')[0];

    // STEP 2: Champions (paginated, limit 100, mokiTokenId as key)
    setStatus('Buscando champions...', 'loading');
    setProgress(10, 'Buscando champions com stats...');
    const champList = await fetchAllPages('/mokis?isChampion=true');
    const champMap = {}; // by mokiTokenId
    champList.forEach(c => { champMap[c.mokiTokenId] = c; });
    setProgress(20, `${champList.length} champions carregados`);

    // STEP 3: All matches (paginated, limit 100, matchDate filter)
    setStatus('Buscando partidas...', 'loading');
    setProgress(25, `Buscando partidas (data: ${matchDate})...`);
    const matches = await fetchAllPages(`/contests/${contestId}/matches?matchDate=${matchDate}`);
    setProgress(42, `${matches.length} partidas carregadas`);

    // STEP 4: Collect unique mokiTokenIds
    setStatus('Identificando Mokis...', 'loading');
    setProgress(44, 'Coletando IDs...');
    const supportTokenIds = new Set();
    const needsStatsTokenIds = new Set();

    matches.forEach(m => {
      m.players.forEach(p => {
        if (!champMap[p.mokiTokenId]) {
          supportTokenIds.add(p.mokiTokenId);
        }
        if (GENERALISTAS.includes(p.class) || p.class === 'Grinder') {
          needsStatsTokenIds.add(p.mokiTokenId);
        }
      });
    });

    // STEP 5: Bulk fetch supports (mokiTokenId numbers, batch 50)
    const supportTokenArr = Array.from(supportTokenIds);
    const supportMap = {}; // by mokiTokenId
    const batchSize = 50;
    const batches = Math.ceil(supportTokenArr.length / batchSize);

    for (let i = 0; i < batches; i++) {
      const batch = supportTokenArr.slice(i * batchSize, (i + 1) * batchSize);
      const pct = 44 + Math.round((i / batches) * 20);
      setStatus(`Buscando suportes: lote ${i+1}/${batches}...`, 'loading');
      setProgress(pct, `Bulk suportes: lote ${i+1}/${batches}...`);
      try {
        const bulkData = await apiGet(`/mokis/bulk?ids=${batch.join(',')}`);
        bulkData.data.forEach(m => { supportMap[m.mokiTokenId] = m; });
      } catch(e) { console.warn('Bulk error:', e); }
      if (i < batches - 1) await sleep(250);
    }

    // STEP 6: Medias Season 1 - cache localStorage valido por 12h
    const CACHE_KEY = 'ga_leaderboard_cache';
    const CACHE_TTL = 12 * 60 * 60 * 1000;
    const statsMap = {};

    let cacheLoaded = false;
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const { timestamp, data } = JSON.parse(raw);
        if (Date.now() - timestamp < CACHE_TTL) {
          Object.assign(statsMap, data);
          cacheLoaded = true;
          setStatus('Cache Season 1 carregado!', 'done');
          setProgress(85, 'Cache Season 1 carregado!');
        }
      }
    } catch(e) { console.warn('Cache read error:', e); }

    if (!cacheLoaded) {
      const leaderboardIds = ['6997a23dfe65385c3bd784e8', '6997a23dfe65385c3bd784e5'];
      for (const lbId of leaderboardIds) {
        const lbName = lbId === '6997a23dfe65385c3bd784e8' ? 'Regulars' : 'Champions';
        let page = 1;
        let totalPages = 999;
        while (page <= totalPages) {
          const pct = 65 + Math.round((page / 84) * 20);
          setStatus(`Leaderboard ${lbName}: pagina ${page}${totalPages < 999 ? ' de ' + totalPages : ''}...`, 'loading');
          setProgress(Math.min(pct, 84), `Carregando medias Season 1: ${lbName} p.${page}...`);
          try {
            const data = await apiGet(`/leaderboards/${lbId}/scores?limit=100&page=${page}`);
            totalPages = data.pagination?.pages || 1;
            (data.data || []).forEach(entry => {
              const tid = entry.mokiTokenId;
              const mm = entry.scoreDetail?.mokiMayhem;
              if (mm) {
                statsMap[tid] = {
                  avgEliminations: mm.avgEliminations || 0,
                  avgDeposits: mm.avgDeposits || 0,
                  avgWartDistance: mm.avgWartDistance || 0
                };
              }
            });
          } catch(e) { console.warn(`LB page ${page} error:`, e); }
          page++;
          await sleep(100);
        }
      }
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: statsMap }));
        setStatus('Leaderboard Season 1 carregado e salvo no cache', 'done');
      } catch(e) { console.warn('Cache write error:', e); }
    }

    // Helpers
    const getMoki = (tokenId) => champMap[tokenId] || supportMap[tokenId] || null;
    const getMokiClass = (p) => {
      const moki = getMoki(p.mokiTokenId);
      return moki?.gameStats?.class || p.class; // usa gameStats.class, fallback p.class
    };
    const getStats = (tokenId) => getMoki(tokenId)?.gameStats?.stats || null;
    const getAvgKills = (tokenId) => statsMap[tokenId]?.avgEliminations || 0;
    const getAvgData = (tokenId) => statsMap[tokenId] || null;

    // STEP 7: Build champion match index
    setStatus('Analisando partidas...', 'loading');
    setProgress(86, 'Cruzando dados...');

    const champMatches = {};
    matches.forEach(m => {
      m.players.forEach(p => {
        if (champMap[p.mokiTokenId]) {
          if (!champMatches[p.mokiTokenId]) champMatches[p.mokiTokenId] = [];
          champMatches[p.mokiTokenId].push({ match: m, champSide: p.team, champTokenId: p.mokiTokenId });
        }
      });
    });

    // STEP 8: Analyze each champion
    setProgress(90, 'Calculando scores...');
    allRows = [];

    for (const [champTokenIdStr, matchList] of Object.entries(champMatches)) {
      const champTokenId = parseInt(champTokenIdStr);
      const champ = champMap[champTokenId];
      if (!champ) continue;

      let gBlue=0, kBlue=0, gRed=0, kRed=0;
      let ggBlue=0, kkBlue=0, ggRed=0, kkRed=0;
      const detailedMatches = [];

      matchList.forEach(({ match, champSide, champTokenId: cTokenId }, matchIdx) => {
        const allies = match.players.filter(p => p.team === champSide && p.mokiTokenId !== cTokenId);
        const enemies = match.players.filter(p => p.team !== champSide);

        const champClass = champ.gameStats?.class;
        const enemyChamp = enemies.find(p => champMap[p.mokiTokenId]);
        const enemyChampClass = enemyChamp ? champMap[enemyChamp.mokiTokenId]?.gameStats?.class : null;

        const allyResult = classifyTeam(allies, champClass, enemyChampClass, getMokiClass, getStats, getAvgKills, champMap, false);
        const enemyResult = classifyTeam(enemies, enemyChampClass, champClass, getMokiClass, getStats, getAvgKills, champMap, true);

        if (allyResult.binGachas > 0) gBlue++;
        if (allyResult.binKillers > 0) kBlue++;
        if (enemyResult.binGachas > 0) gRed++;
        if (enemyResult.binKillers > 0) kRed++;

        ggBlue += allyResult.totalGachas;
        kkBlue += allyResult.totalKillers;
        ggRed += enemyResult.totalGachas;
        kkRed += enemyResult.totalKillers;

        // Store detailed match data for modal
        const buildPlayerDetail = (p, role) => {
          const avg = getAvgData(p.mokiTokenId);
          return {
            tokenId: p.mokiTokenId,
            name: p.name,
            cls: getMokiClass(p),
            imageUrl: p.imageUrl,
            role,
            avgKills: avg?.avgEliminations ?? null,
            avgDeposits: avg?.avgDeposits ?? null,
            avgWart: avg?.avgWartDistance ?? null
          };
        };

        // Champion detail para mostrar no modal
        const champDetail = {
          tokenId: cTokenId,
          name: champ.name,
          cls: champ.gameStats?.class || '?',
          imageUrl: champ.imageUrl || '',
          role: 'CHAMP',
          avgKills: getAvgData(cTokenId)?.avgEliminations ?? null,
          avgDeposits: getAvgData(cTokenId)?.avgDeposits ?? null,
          avgWart: getAvgData(cTokenId)?.avgWartDistance ?? null
        };

        detailedMatches.push({
          matchIdx: matchIdx + 1,
          champ: champDetail,
          allies: allies.map((p, i) => buildPlayerDetail(p, allyResult.roles[i])),
          enemies: enemies.map((p, i) => buildPlayerDetail(p, enemyResult.roles[i])),
          allyB: allyResult.totalGachas,
          allyK: allyResult.totalKillers,
          enemyB: enemyResult.totalGachas,
          enemyK: enemyResult.totalKillers
        });
      });

      champMatchesData[champTokenId] = detailedMatches;

      allRows.push({
        name: champ.name,
        class: champ.gameStats?.class || '?',
        champTokenId,
        gBlue, kBlue, gRed, kRed,
        ggBlue, kkBlue, ggRed, kkRed,
        matches: matchList.length
      });
    }

    setProgress(100, `Análise completa — ${allRows.length} champions`);
    setStatus(`✓ ${allRows.length} champions | ${matches.length} partidas`, 'done');
    loadFavs();
    renderSummary();
    renderTable();
    document.getElementById('filtersSection').style.display = 'block';
    document.getElementById('summaryBar').style.display = 'flex';
    document.getElementById('tabsBar').style.display = 'flex';

  } catch(e) {
    setStatus('Erro: ' + e.message, 'error');
    console.error(e);
  }

  document.getElementById('loadBtn').disabled = false;
}

function classifyTeam(players, myChampClass, enemyChampClass, getMokiClass, getStats, getAvgKills, champMap, isEnemyTeam) {
  const isGachaChamp = (cls) => cls === 'Striker';
  const isDefenderChamp = (cls) => cls === 'Defender';

  const classified = players.map(p => {
    const tokenId = p.mokiTokenId;
    const cls = getMokiClass(p); // sempre usa gameStats.class, nunca p.class do matchup
    const stats = getStats(tokenId);
    const str = stats?.strength?.total || 0;
    const dex = stats?.dexterity?.total || 0;
    const def = stats?.defense?.total || 0;
    const avgKills = getAvgKills(tokenId);

    let role;
    switch(cls) {
      case 'Striker': role = 'B'; break;
      case 'Bruiser': role = 'K'; break;
      case 'Grinder': role = (avgKills >= 1.4 || str > dex) ? 'K' : 'B'; break;
      case 'Sprinter': role = dex > def ? 'B' : 'SPR_DEF'; break;
      case 'Defender': role = 'DEF'; break;
      case 'Support': role = 'SUP'; break;
      default: role = avgKills > 1.3 ? 'K' : 'N'; // Generalistas: estritamente > 1.3
    }
    return { tokenId, cls, role, str, dex, def, avgKills };
  });

  const defCount = classified.filter(c => c.role === 'DEF').length;
  const sprDefCount = classified.filter(c => c.role === 'SPR_DEF').length;
  const hasDefDef = defCount >= 2;
  const hasDefSpr = defCount >= 1 && sprDefCount >= 1;
  const hasSprSpr = sprDefCount >= 2;
  const hasSpecialCombo = hasDefDef || hasDefSpr || hasSprSpr;

  // Generalistas com champion do PROPRIO time sendo Defender = bonus K
  const generalistas = classified.filter(c => ['Forward','Anchor','Center','Flanker'].includes(c.cls));
  const generalistasHighKill = generalistas.filter(c => c.avgKills > 1.3);

  const finalRoles = classified.map(c => {
    if (c.role === 'B' || c.role === 'K' || c.role === 'N') return c.role;
    if (c.role === 'DEF') {
      if (hasSpecialCombo) return 'K';
      if (!isEnemyTeam && isGachaChamp(myChampClass) && isDefenderChamp(enemyChampClass)) return 'K';
      return 'N';
    }
    if (c.role === 'SPR_DEF') {
      if (hasSpecialCombo) return 'K';
      return 'N';
    }
    if (c.role === 'SUP') {
      if (isDefenderChamp(myChampClass)) return 'K';
      if (isGachaChamp(myChampClass)) return 'B';
      return 'N';
    }
    return 'N';
  });

  let totalKillers = 0;
  let totalGachas = 0;
  let comboUsed = false;

  finalRoles.forEach((role, i) => {
    const origRole = classified[i].role;
    if (role === 'B') {
      totalGachas++;
    } else if (role === 'K') {
      if (origRole === 'SUP' && isDefenderChamp(myChampClass)) {
        // binary only, not total
      } else if (origRole === 'DEF' || origRole === 'SPR_DEF') {
        if (!comboUsed) { totalKillers++; comboUsed = true; }
      } else {
        totalKillers++;
      }
    }
  });

  // Regra especial: generalistas com champion do PROPRIO time sendo Defender
  // - ambos > 1.3 kills = 2 K no total
  // - um ou nenhum > 1.3 = 1 K garantido no total
  const myChampIsDefender = isDefenderChamp(myChampClass);
  if (myChampIsDefender && generalistas.length > 0) {
    if (generalistasHighKill.length >= 2) {
      totalKillers += 2;
    } else {
      totalKillers += 1;
    }
  }

  const hasDefenderBonus = myChampIsDefender && generalistas.length > 0;
  const binKillers = (finalRoles.some(r => r === 'K') || hasDefenderBonus) ? 1 : 0;
  const binGachas = finalRoles.some(r => r === 'B') ? 1 : 0;

  return { binKillers, binGachas, totalKillers, totalGachas, roles: finalRoles };
}

// MODAL
function openModal(champTokenId) {
  const row = allRows.find(r => r.champTokenId === champTokenId);
  if (!row) return;
  const matches = champMatchesData[champTokenId] || [];

  document.getElementById('modalTitle').textContent = `${row.name} — ${row.class} — ${matches.length} partidas`;

  const body = document.getElementById('modalBody');
  body.innerHTML = matches.map((m, idx) => `
    <div class="match-card">
      <div class="match-header">
        <span class="match-num">Partida ${idx + 1}</span>
        <span class="match-score" style="color:var(--blue)">B${m.allyB} K${m.allyK}</span>
        <span class="match-score" style="color:var(--muted)">vs</span>
        <span class="match-score" style="color:var(--red)">B${m.enemyB} K${m.enemyK}</span>
      </div>
      <div class="match-teams">
        <div class="team">
          ${renderChampRow(m.champ)}
          ${m.allies.map(p => renderMokiRow(p, false)).join('')}
        </div>
        <div class="match-vs">VS</div>
        <div class="team enemy">
          ${m.enemies.map(p => renderMokiRow(p, true)).join('')}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function renderChampRow(p) {
  const avgStr = p.avgKills !== null
    ? `<span class="moki-avg">K:${p.avgKills.toFixed(1)} W:${(p.avgWart||0).toFixed(0)} B:${(p.avgDeposits||0).toFixed(1)}</span>`
    : '';
  return `
    <div class="moki-row" style="border:1px solid rgba(0,255,136,0.3);border-radius:8px;padding:2px 6px;background:rgba(0,255,136,0.04);margin-bottom:2px">
      <img class="moki-img" src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'">
      <div class="moki-info">
        <span class="moki-name" style="color:var(--accent)">${p.name} <span style="font-size:9px;color:var(--accent);font-family:Space Mono,monospace">CHAMP</span></span>
        <div class="moki-meta">
          <span class="class-badge ${p.cls}">${p.cls}</span>
          ${avgStr}
        </div>
      </div>
    </div>
  `;
}

function renderMokiRow(p, isEnemy) {
  const roleClass = p.role === 'K' ? 'role-K' : p.role === 'B' ? 'role-B' : 'role-N';
  const avgStr = p.avgKills !== null
    ? `<span class="moki-avg">K:${p.avgKills.toFixed(1)} W:${(p.avgWart||0).toFixed(0)} B:${(p.avgDeposits||0).toFixed(1)}</span>`
    : '';
  return `
    <div class="moki-row ${isEnemy ? 'enemy' : ''}">
      <img class="moki-img" src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'">
      <div class="moki-info ${isEnemy ? 'enemy' : ''}">
        <span class="moki-name">${p.name}</span>
        <div class="moki-meta ${isEnemy ? 'enemy' : ''}">
          <span class="class-badge ${p.cls}">${p.cls}</span>
          <span class="role-badge ${roleClass}">${p.role}</span>
          ${avgStr}
        </div>
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  const cols = ['name','class','gBlue','kBlue','gRed','kRed','ggBlue','kkBlue','ggRed','kkRed','matches'];
  document.querySelectorAll('th').forEach((th, i) => {
    th.classList.remove('sorted');
    const s = th.querySelector('span');
    if (s) s.textContent = '';
    if (cols[i] === col) {
      th.classList.add('sorted');
      if (s) s.textContent = sortDir === -1 ? '↓' : '↑';
    }
  });
  renderTable();
}

function renderTable() {
  let rows = [...allRows];

  const search = document.getElementById('searchName')?.value?.toLowerCase() || '';
  if (search) rows = rows.filter(r => r.name.toLowerCase().includes(search));
  if (filterClass !== 'all') rows = rows.filter(r => r.class === filterClass);

  const fgBlue = parseInt(document.getElementById('f-gBlue').value) || 0;
  const fkBlue = parseInt(document.getElementById('f-kBlue').value) || 0;
  const fgRed = parseInt(document.getElementById('f-gRed').value) || 0;
  const fkRed = parseInt(document.getElementById('f-kRed').value) || 0;
  const fggBlue = parseInt(document.getElementById('f-ggBlue').value) || 0;
  const fkkBlue = parseInt(document.getElementById('f-kkBlue').value) || 0;
  const fggRed = parseInt(document.getElementById('f-ggRed').value) || 0;
  const fkkRed = parseInt(document.getElementById('f-kkRed').value) || 0;

  rows = rows.filter(r =>
    r.gBlue >= fgBlue && r.kBlue >= fkBlue &&
    r.gRed >= fgRed && r.kRed >= fkRed &&
    r.ggBlue >= fggBlue && r.kkBlue >= fkkBlue &&
    r.ggRed >= fggRed && r.kkRed >= fkkRed
  );

  if (activeTab === 'favs') rows = rows.filter(r => favorites.has(r.champTokenId));

  rows.sort((a, b) => {
    const av = a[sortCol]; const bv = b[sortCol];
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  if (rows.length === 0) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  document.getElementById('tableWrap').style.display = 'block';
  document.getElementById('emptyMsg').style.display = 'none';

  document.getElementById('tableBody').innerHTML = rows.map(r => `
    <tr class="${r.matches < 10 ? 'warning' : ''}" onclick="openModal(${r.champTokenId})">
      <td><button class="fav-btn ${favorites.has(r.champTokenId) ? 'active' : ''}" onclick="toggleFav(${r.champTokenId}, event)">⭐</button></td>
      <td><span class="champion-name">${r.name}</span></td>
      <td><span class="class-badge ${r.class}">${r.class}</span></td>
      <td class="col-group-blue"><span class="num blue ${r.gBlue===0?'zero':''}">${r.gBlue}</span></td>
      <td class="col-group-blue2"><span class="num blue ${r.kBlue===0?'zero':''}">${r.kBlue}</span></td>
      <td class="col-group-red"><span class="num red ${r.gRed===0?'zero':''}">${r.gRed}</span></td>
      <td class="col-group-red2"><span class="num red ${r.kRed===0?'zero':''}">${r.kRed}</span></td>
      <td class="col-group-blue"><span class="num blue ${r.ggBlue===0?'zero':''}">${r.ggBlue}</span></td>
      <td class="col-group-blue2"><span class="num blue ${r.kkBlue===0?'zero':''}">${r.kkBlue}</span></td>
      <td class="col-group-red"><span class="num red ${r.ggRed===0?'zero':''}">${r.ggRed}</span></td>
      <td class="col-group-red2"><span class="num red ${r.kkRed===0?'zero':''}">${r.kkRed}</span></td>
      <td><span style="color:var(--muted);font-family:Space Mono,monospace;font-size:13px">${r.matches}</span></td>
    </tr>
  `).join('');
}

function renderSummary() {
  const total = allRows.length;
  const totalM = allRows.reduce((a,r) => a+r.matches, 0);
  const avgKKRed = total ? (allRows.reduce((a,r) => a+r.kkRed, 0)/total).toFixed(1) : 0;
  const avgGGRed = total ? (allRows.reduce((a,r) => a+r.ggRed, 0)/total).toFixed(1) : 0;
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-chip">Champions: <span>${total}</span></div>
    <div class="summary-chip">Partidas: <span>${totalM}</span></div>
    <div class="summary-chip">Média KK🔴: <span>${avgKKRed}</span></div>
    <div class="summary-chip">Média BB🔴: <span>${avgGGRed}</span></div>
  `;
}
</script>
