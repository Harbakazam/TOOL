<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena Analyst</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #ff4466;
    --blue: #4488ff;
    --red: #ff4466;
    --text: #e8e8f0;
    --muted: #666688;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 1.5rem; }
  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); }
  .logo span { color: var(--text); }
  .setup { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 0.75rem; align-items: end; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-family: 'Space Mono', monospace; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 9px 20px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .filters-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: none; }
  .filters-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 0.75rem; }
  .filters-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0.5rem; margin-bottom: 0.75rem; }
  .filter-field label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 3px; font-family: 'Space Mono', monospace; text-align: center; }
  .filter-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px; outline: none; text-align: center; }
  .filter-field input:focus { border-color: var(--accent); }
  .class-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--muted); font-size: 11px; font-family: 'Space Mono', monospace; cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }

  .status-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 0.75rem; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); display: none; align-items: center; gap: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .dot.done { background: var(--accent); }
  .dot.error { background: var(--accent2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .rate-info { margin-left: auto; font-size: 10px; }

  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: none; }
  .progress-bar-bg { background: var(--surface2); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .progress-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .summary-bar { display: none; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .summary-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .summary-chip span { color: var(--text); font-weight: 700; }

  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); display: none; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { background: var(--surface); position: sticky; top: 0; z-index: 10; }
  th { padding: 9px 10px; text-align: left; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  .th-blue { color: var(--blue) !important; }
  .th-red { color: var(--red) !important; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface); }
  tbody tr.warning { background: rgba(255, 180, 0, 0.05); }
  tbody tr.warning td:first-child::after { content: ' ⚠'; color: #ffb400; font-size: 10px; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 9px 10px; white-space: nowrap; }
  .champion-name { font-weight: 600; font-size: 12px; color: var(--text); }
  .class-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-family: 'Space Mono', monospace; font-weight: 700; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .class-badge.Bruiser { background: rgba(255,102,68,0.15); color: #ff6644; border-color: rgba(255,102,68,0.3); }
  .class-badge.Striker { background: rgba(68,170,255,0.15); color: #44aaff; border-color: rgba(68,170,255,0.3); }
  .class-badge.Defender { background: rgba(100,200,100,0.15); color: #64c864; border-color: rgba(100,200,100,0.3); }
  .class-badge.Sprinter { background: rgba(255,200,50,0.15); color: #ffc832; border-color: rgba(255,200,50,0.3); }
  .class-badge.Grinder { background: rgba(180,100,255,0.15); color: #b464ff; border-color: rgba(180,100,255,0.3); }
  .class-badge.Support { background: rgba(255,180,50,0.15); color: #ffb432; border-color: rgba(255,180,50,0.3); }
  .class-badge.Forward,.class-badge.Anchor,.class-badge.Center,.class-badge.Flanker { background: rgba(180,180,200,0.1); color: #aaaacc; border-color: rgba(180,180,200,0.2); }
  .num { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; }
  .num.blue { color: var(--blue); }
  .num.red { color: var(--red); }
  .num.zero { color: var(--border); }
  .col-group-blue { border-left: 2px solid rgba(68,136,255,0.3); }
  .col-group-red { border-left: 2px solid rgba(255,68,102,0.3); }
  .col-group-blue2 { border-left: 1px solid rgba(68,136,255,0.15); }
  .col-group-red2 { border-left: 1px solid rgba(255,68,102,0.15); }
  .empty { text-align: center; padding: 4rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">GRAND<span>ARENA</span> <span style="color:var(--muted);font-size:0.85rem;font-weight:400">analyst</span></div>
</div>

<div class="setup">
  <div class="field">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="ga_xxxxxxxxxxxxxxxx" />
  </div>
  <div class="field">
    <label>Contest ID</label>
    <input type="text" id="contestId" placeholder="69e5e8bbf5706e68ae6c16ed" />
  </div>
  <button class="btn" id="loadBtn" onclick="loadData()">Analisar</button>
  <button class="btn-secondary" onclick="saveKey()">Salvar Key</button>
</div>

<div id="statusBar" class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span id="statusText"></span>
  <span class="rate-info" id="rateInfo"></span>
</div>

<div id="progressWrap" class="progress-wrap">
  <div class="progress-text" id="progressText"></div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div id="summaryBar" class="summary-bar"></div>

<div id="filtersSection" class="filters-section">
  <div class="filters-title">Filtros mínimos</div>
  <div class="filters-grid">
    <div class="filter-field">
      <label>G🔵 min</label>
      <input type="number" id="f-gBlue" min="0" max="10" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>K🔵 min</label>
      <input type="number" id="f-kBlue" min="0" max="10" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>G🔴 min</label>
      <input type="number" id="f-gRed" min="0" max="10" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>K🔴 min</label>
      <input type="number" id="f-kRed" min="0" max="10" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>GG🔵 min</label>
      <input type="number" id="f-ggBlue" min="0" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>KK🔵 min</label>
      <input type="number" id="f-kkBlue" min="0" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>GG🔴 min</label>
      <input type="number" id="f-ggRed" min="0" placeholder="—" oninput="applyFilters()">
    </div>
    <div class="filter-field">
      <label>KK🔴 min</label>
      <input type="number" id="f-kkRed" min="0" placeholder="—" oninput="applyFilters()">
    </div>
  </div>
  <div class="class-filters" id="classFilters"></div>
</div>

<div id="tableWrap" class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('name')">Champion <span id="arr-name"></span></th>
        <th onclick="sortBy('class')">Classe <span id="arr-class"></span></th>
        <th class="col-group-blue th-blue" onclick="sortBy('gBlue')">G🔵 <span id="arr-gBlue"></span></th>
        <th class="col-group-blue2 th-blue" onclick="sortBy('kBlue')">K🔵 <span id="arr-kBlue"></span></th>
        <th class="col-group-red th-red" onclick="sortBy('gRed')">G🔴 <span id="arr-gRed"></span></th>
        <th class="col-group-red2 th-red" onclick="sortBy('kRed')">K🔴 <span id="arr-kRed"></span></th>
        <th class="col-group-blue th-blue" onclick="sortBy('ggBlue')">GG🔵 <span id="arr-ggBlue"></span></th>
        <th class="col-group-blue2 th-blue" onclick="sortBy('kkBlue')">KK🔵 <span id="arr-kkBlue"></span></th>
        <th class="col-group-red th-red" onclick="sortBy('ggRed')">GG🔴 <span id="arr-ggRed"></span></th>
        <th class="col-group-red2 th-red" onclick="sortBy('kkRed')">KK🔴 <span id="arr-kkRed"></span></th>
        <th onclick="sortBy('matches')" style="color:var(--muted)">Partidas <span id="arr-matches"></span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div id="emptyMsg" class="empty">Nenhum champion encontrado com esses filtros.</div>

<script>
const PROXY = 'https://toolproxy.aikazamage.workers.dev';
const CLASSES = ['Striker','Defender','Bruiser','Sprinter','Grinder','Support','Forward','Anchor','Center','Flanker'];
let allRows = [];
let sortCol = 'kkRed';
let sortDir = -1;
let filterClass = 'all';
const cache = {};

// Load saved key
window.onload = () => {
  const saved = localStorage.getItem('ga_api_key');
  if (saved) document.getElementById('apiKey').value = saved;
  buildClassFilters();
};

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) { localStorage.setItem('ga_api_key', k); alert('API Key salva!'); }
}

function buildClassFilters() {
  const div = document.getElementById('classFilters');
  div.innerHTML = '<span style="font-size:10px;color:var(--muted);font-family:Space Mono,monospace;margin-right:4px">CLASSE:</span>';
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'Todos';
  all.onclick = () => setClassFilter('all', all);
  div.appendChild(all);
  CLASSES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c;
    btn.onclick = () => setClassFilter(c, btn);
    div.appendChild(btn);
  });
}

function setClassFilter(cls, btn) {
  filterClass = cls;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function getApiKey() { return document.getElementById('apiKey').value.trim(); }
function getContestId() { return document.getElementById('contestId').value.trim(); }

function setStatus(msg, state='loading') {
  const bar = document.getElementById('statusBar');
  bar.style.display = 'flex';
  document.getElementById('statusDot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

function setProgress(pct, msg) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = msg;
}

function updateRate(headers) {
  const rem = headers.get('X-RateLimit-Remaining');
  const lim = headers.get('X-RateLimit-Limit');
  if (rem && lim) document.getElementById('rateInfo').textContent = `Rate: ${rem}/${lim}`;
}

async function apiGet(path) {
  if (cache[path]) return cache[path];
  const res = await fetch(`${PROXY}?url=${encodeURIComponent(path)}`, {
    headers: { 'x-api-key': getApiKey() }
  });
  updateRate(res.headers);
  if (!res.ok) throw new Error(`HTTP ${res.status} em ${path}`);
  const data = await res.json();
  cache[path] = data;
  return data;
}

async function fetchAllPages(basePath) {
  const all = [];
  let page = 1;
  let total = Infinity;
  while (all.length < total) {
    const sep = basePath.includes('?') ? '&' : '?';
    const data = await apiGet(`${basePath}${sep}limit=100&page=${page}`);
    const items = data.data || [];
    all.push(...items);
    total = data.pagination?.total ?? all.length;
    if (items.length < 100) break;
    page++;
    if (page > 1) await sleep(200);
  }
  return all;
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loadData() {
  const apiKey = getApiKey();
  const contestId = getContestId();
  if (!apiKey || !contestId) { alert('Preencha a API key e o Contest ID'); return; }

  document.getElementById('loadBtn').disabled = true;
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('filtersSection').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('emptyMsg').style.display = 'none';
  Object.keys(cache).forEach(k => delete cache[k]);
  allRows = [];

  try {
    // STEP 1: Contest info
    setStatus('Buscando contest...', 'loading');
    setProgress(5, 'Buscando informações do contest...');
    const contestData = await apiGet(`/contests/${contestId}`);
    let matchDate = new Date().toISOString().split('T')[0];
    if (contestData.startDate) matchDate = contestData.startDate.split('T')[0];
    else if (contestData.data?.startDate) matchDate = contestData.data.startDate.split('T')[0];

    // STEP 2: All champions with stats
    setStatus('Buscando champions...', 'loading');
    setProgress(10, 'Buscando 240 champions com stats...');
    const champList = await fetchAllPages('/mokis?isChampion=true');
    const champMap = {}; // by mokiTokenId
    const champMapById = {}; // by mokiId
    champList.forEach(c => {
      champMap[c.mokiTokenId] = c;
      champMapById[c.id] = c;
    });
    setProgress(20, `${champList.length} champions carregados`);

    // STEP 3: All matches
    setStatus('Buscando partidas...', 'loading');
    setProgress(25, 'Buscando partidas do contest...');
    const matches = await fetchAllPages(`/contests/${contestId}/matches?matchDate=${matchDate}`);
    setProgress(42, `${matches.length} partidas carregadas`);

    // STEP 4: Collect unique support IDs and IDs needing stats (Generalistas + Grinders)
    setStatus('Identificando suportes...', 'loading');
    setProgress(44, 'Coletando IDs...');
    const supportIds = new Set();
    const needsStatsIds = new Set(); // Generalistas + Grinders
    const GENERALISTAS = ['Forward','Anchor','Center','Flanker'];

    matches.forEach(m => {
      m.players.forEach(p => {
        if (!champMap[p.mokiTokenId]) {
          supportIds.add(p.mokiId);
          if (GENERALISTAS.includes(p.class) || p.class === 'Grinder') {
            needsStatsIds.add(p.mokiId);
          }
        } else {
          // Champion generalistas/grinders also need stats
          if (GENERALISTAS.includes(p.class) || p.class === 'Grinder') {
            needsStatsIds.add(p.mokiId);
          }
        }
      });
    });

    // STEP 5: Fetch support stats in bulk
    const supportIdArr = Array.from(supportIds);
    const supportMap = {}; // by mokiId
    const batchSize = 50;
    const batches = Math.ceil(supportIdArr.length / batchSize);
    for (let i = 0; i < batches; i++) {
      const batch = supportIdArr.slice(i * batchSize, (i + 1) * batchSize);
      const pct = 44 + Math.round((i / batches) * 25);
      setStatus(`Buscando suportes: lote ${i+1}/${batches}...`, 'loading');
      setProgress(pct, `Bulk suportes: lote ${i+1}/${batches}...`);
      try {
        const bulkData = await apiGet(`/mokis/bulk?ids=${batch.join(',')}`);
        bulkData.data.forEach(m => { supportMap[m.id] = m; });
      } catch(e) { console.warn('Bulk error:', e); }
      if (i < batches - 1) await sleep(250);
    }

    // STEP 6: Fetch stats for Generalistas + Grinders
    const statsMap = {}; // by mokiId -> { avgEliminations }
    const needsStatsArr = Array.from(needsStatsIds);
    const statsBatches = Math.ceil(needsStatsArr.length / 10); // 10 at a time with breathing room
    for (let i = 0; i < needsStatsArr.length; i++) {
      const id = needsStatsArr[i];
      const pct = 70 + Math.round((i / needsStatsArr.length) * 15);
      if (i % 20 === 0) {
        setStatus(`Buscando stats generalistas/grinders: ${i+1}/${needsStatsArr.length}...`, 'loading');
        setProgress(pct, `Stats: ${i+1}/${needsStatsArr.length}...`);
      }
      try {
        const statsData = await apiGet(`/mokis/${id}/stats`);
        if (statsData.data) statsMap[id] = statsData.data;
      } catch(e) { console.warn('Stats error:', e); }
      await sleep(100); // breathing room for heavy endpoint
    }

    // STEP 7: Build champion match index
    setStatus('Analisando partidas...', 'loading');
    setProgress(86, 'Cruzando dados e classificando...');

    const champMatches = {};
    matches.forEach(m => {
      m.players.forEach(p => {
        if (champMap[p.mokiTokenId]) {
          if (!champMatches[p.mokiTokenId]) champMatches[p.mokiTokenId] = [];
          champMatches[p.mokiTokenId].push({ match: m, champSide: p.team, champTokenId: p.mokiTokenId, champId: p.mokiId });
        }
      });
    });

    // STEP 8: Analyze each champion
    setProgress(90, 'Calculando scores...');
    allRows = [];

    const getMokiData = (p) => {
      if (champMap[p.mokiTokenId]) return champMap[p.mokiTokenId];
      return supportMap[p.mokiId];
    };

    const getStats = (p) => {
      const data = getMokiData(p);
      return data?.gameStats?.stats;
    };

    const getAvgKills = (p) => {
      // For champion themselves
      if (champMap[p.mokiTokenId]) {
        const id = champMapById[Object.values(champMapById).find(c => c.mokiTokenId === p.mokiTokenId)?.id]?.id || p.mokiId;
        if (statsMap[p.mokiId]) return statsMap[p.mokiId].avgEliminations || 0;
      }
      if (statsMap[p.mokiId]) return statsMap[p.mokiId].avgEliminations || 0;
      return 0;
    };

    for (const [champTokenId, matchList] of Object.entries(champMatches)) {
      const champ = champMap[parseInt(champTokenId)];
      if (!champ) continue;

      let gBlue=0, kBlue=0, gRed=0, kRed=0;
      let ggBlue=0, kkBlue=0, ggRed=0, kkRed=0;

      matchList.forEach(({ match, champSide, champTokenId: cTokenId, champId }) => {
        // Allies = teammates excluding the champion itself
        const allies = match.players.filter(p => p.team === champSide && p.mokiTokenId !== parseInt(cTokenId));
        const enemies = match.players.filter(p => p.team !== champSide);

        // Find ally champion (the champion we're analyzing is cTokenId)
        // allies are the 2 supporters
        const champData = champ;
        const champClass = champData.gameStats?.class;
        const champStats = champData.gameStats?.stats;

        // Find enemy champion
        const enemyChamp = enemies.find(p => champMap[p.mokiTokenId]);
        const enemyChampClass = enemyChamp ? champMap[enemyChamp.mokiTokenId]?.gameStats?.class : null;

        // Classify allies (2 supporters)
        const { killers: allyK, gachas: allyG } = classifyTeam(allies, champClass, champStats, enemyChampClass, getMokiData, getStats, getAvgKills, statsMap, champMap, supportMap);

        // Classify enemies (3 mokis including enemy champion)
        const { killers: enemyK, gachas: enemyG } = classifyTeam(enemies, null, null, champClass, getMokiData, getStats, getAvgKills, statsMap, champMap, supportMap, true);

        if (allyG > 0) gBlue++;
        if (allyK > 0) kBlue++;
        if (enemyG > 0) gRed++;
        if (enemyK > 0) kRed++;

        ggBlue += allyG;
        kkBlue += allyK;
        ggRed += enemyG;
        kkRed += enemyK;
      });

      allRows.push({
        name: champ.name,
        class: champ.gameStats?.class || '?',
        gBlue, kBlue, gRed, kRed,
        ggBlue, kkBlue, ggRed, kkRed,
        matches: matchList.length
      });
    }

    setProgress(100, `Análise completa — ${allRows.length} champions`);
    setStatus(`✓ ${allRows.length} champions | ${matches.length} partidas`, 'done');
    renderSummary();
    renderTable();
    document.getElementById('filtersSection').style.display = 'block';
    document.getElementById('summaryBar').style.display = 'flex';

  } catch(e) {
    setStatus('Erro: ' + e.message, 'error');
    console.error(e);
  }

  document.getElementById('loadBtn').disabled = false;
}

function classifyTeam(players, allyChampClass, allyChampStats, enemyChampClass, getMokiData, getStats, getAvgKills, statsMap, champMap, supportMap, isEnemy = false) {
  const GENERALISTAS = ['Forward','Anchor','Center','Flanker'];
  
  // Find the champion in this group (for enemy team analysis)
  const teamChamp = players.find(p => champMap[p.mokiTokenId]);
  const teamChampClass = teamChamp ? champMap[teamChamp.mokiTokenId]?.gameStats?.class : null;

  // For enemy team, use their champion class as the "allyChampClass"
  const effectiveChampClass = isEnemy ? teamChampClass : allyChampClass;
  // For enemy team, the "enemyChampClass" is the ally champion class
  const effectiveEnemyChampClass = isEnemy ? allyChampClass : enemyChampClass;

  // First pass: classify each moki
  const classified = players.map(p => {
    const cls = p.class;
    const stats = getStats(p);
    const avgKills = getAvgKills(p);
    const str = stats?.strength?.total || 0;
    const dex = stats?.dexterity?.total || 0;
    const def = stats?.defense?.total || 0;

    if (cls === 'Striker') return { p, cls, role: 'G' };
    if (cls === 'Bruiser') return { p, cls, role: 'K' };
    if (cls === 'Grinder') {
      if (avgKills >= 1.4 || str > dex) return { p, cls, role: 'K' };
      return { p, cls, role: 'G' };
    }
    if (cls === 'Sprinter') {
      if (dex > def) return { p, cls, role: 'G' };
      return { p, cls, role: 'SPR_DEF' }; // def > dex sprinter
    }
    if (cls === 'Defender') return { p, cls, role: 'DEF' };
    if (cls === 'Support') return { p, cls, role: 'SUP' };
    if (GENERALISTAS.includes(cls)) {
      if (avgKills >= 1.3) return { p, cls, role: 'K' };
      return { p, cls, role: 'N' };
    }
    return { p, cls, role: 'N' };
  });

  // Second pass: apply context rules
  const defCount = classified.filter(c => c.role === 'DEF').length;
  const sprDefCount = classified.filter(c => c.role === 'SPR_DEF').length;
  const gachaCount = classified.filter(c => c.role === 'G').length;

  let killers = 0;
  let gachas = 0;
  let specialKillerCount = 0; // for Def+Def, Def+Spr, Spr+Spr combos

  // Check special combinations
  const hasDefDef = defCount >= 2;
  const hasDefSpr = defCount >= 1 && sprDefCount >= 1;
  const hasSprSpr = sprDefCount >= 2;
  const hasSpecialCombo = hasDefDef || hasDefSpr || hasSprSpr;

  // Check if ally champion is Gacha class
  const champIsGacha = ['Striker'].includes(effectiveChampClass) ||
    (effectiveChampClass === 'Sprinter'); // simplified

  // Check if enemy champion is Defender
  const enemyChampIsDefender = effectiveEnemyChampClass === 'Defender';

  classified.forEach(({ p, cls, role }) => {
    if (role === 'G') {
      gachas++;
      return;
    }
    if (role === 'K') {
      killers++;
      return;
    }
    if (role === 'DEF') {
      if (hasDefDef || hasDefSpr) {
        // part of special combo - handled below
        return;
      }
      // Defender aliado quando champion aliado é Gacha E champion inimigo é Defender
      if (!isEnemy && champIsGacha && enemyChampIsDefender) {
        // count as killer but via special combo logic
        return;
      }
      // Defender alone: check if paired with 2 gachas and enemy champ is gacha
      if (gachaCount >= 2 && !enemyChampIsDefender) {
        // Neutro
        return;
      }
      // Default neutro
      return;
    }
    if (role === 'SPR_DEF') {
      if (hasDefSpr || hasSprSpr) {
        // part of special combo
        return;
      }
      // Sprinter def>dex alone: check context
      if (gachaCount >= 2) return; // neutro
      return; // neutro
    }
    if (role === 'SUP') {
      // Support with ally champion Defender -> K (binary only, not total)
      if (effectiveChampClass === 'Defender') {
        killers++; // binary killer - but we'll handle total separately
        return;
      }
      // Support with ally champion Striker -> G
      if (effectiveChampClass === 'Striker') {
        gachas++;
        return;
      }
      // Neutro
      return;
    }
    // N = neutro
  });

  // Handle special combos (Def+Def, Def+Spr, Spr+Spr) = 1 killer
  if (hasSpecialCombo) {
    killers++; // count as 1 killer
  }

  // Handle Defender aliado rule (champion ally is Gacha + enemy champ is Defender)
  if (!isEnemy && !hasSpecialCombo && defCount === 1 && champIsGacha && enemyChampIsDefender) {
    killers++; // 1 killer
  }

  // Handle enemy champion Defender: check if Support counted as killer (binary only)
  // For total: support doesn't count in total killer count
  // This is handled by the Support logic above (it adds to killers for binary)
  // For total we need to subtract support killers
  // We track this separately

  return { killers, gachas };
}

function applyFilters() { renderTable(); }

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  const cols = ['name','class','gBlue','kBlue','gRed','kRed','ggBlue','kkBlue','ggRed','kkRed','matches'];
  document.querySelectorAll('th').forEach((th, i) => {
    th.classList.remove('sorted');
    const s = th.querySelector('span');
    if (s) s.textContent = '';
    if (cols[i] === col) {
      th.classList.add('sorted');
      if (s) s.textContent = sortDir === -1 ? '↓' : '↑';
    }
  });
  renderTable();
}

function renderTable() {
  let rows = [...allRows];

  // Class filter
  if (filterClass !== 'all') rows = rows.filter(r => r.class === filterClass);

  // Min filters
  const filters = {
    gBlue: parseInt(document.getElementById('f-gBlue').value) || 0,
    kBlue: parseInt(document.getElementById('f-kBlue').value) || 0,
    gRed: parseInt(document.getElementById('f-gRed').value) || 0,
    kRed: parseInt(document.getElementById('f-kRed').value) || 0,
    ggBlue: parseInt(document.getElementById('f-ggBlue').value) || 0,
    kkBlue: parseInt(document.getElementById('f-kkBlue').value) || 0,
    ggRed: parseInt(document.getElementById('f-ggRed').value) || 0,
    kkRed: parseInt(document.getElementById('f-kkRed').value) || 0,
  };

  rows = rows.filter(r =>
    r.gBlue >= filters.gBlue &&
    r.kBlue >= filters.kBlue &&
    r.gRed >= filters.gRed &&
    r.kRed >= filters.kRed &&
    r.ggBlue >= filters.ggBlue &&
    r.kkBlue >= filters.kkBlue &&
    r.ggRed >= filters.ggRed &&
    r.kkRed >= filters.kkRed
  );

  // Sort
  rows.sort((a, b) => {
    const av = a[sortCol]; const bv = b[sortCol];
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  if (rows.length === 0) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }

  document.getElementById('tableWrap').style.display = 'block';
  document.getElementById('emptyMsg').style.display = 'none';

  document.getElementById('tableBody').innerHTML = rows.map(r => `
    <tr class="${r.matches < 10 ? 'warning' : ''}">
      <td><span class="champion-name">${r.name}</span></td>
      <td><span class="class-badge ${r.class}">${r.class}</span></td>
      <td class="col-group-blue"><span class="num blue ${r.gBlue===0?'zero':''}">${r.gBlue}</span></td>
      <td class="col-group-blue2"><span class="num blue ${r.kBlue===0?'zero':''}">${r.kBlue}</span></td>
      <td class="col-group-red"><span class="num red ${r.gRed===0?'zero':''}">${r.gRed}</span></td>
      <td class="col-group-red2"><span class="num red ${r.kRed===0?'zero':''}">${r.kRed}</span></td>
      <td class="col-group-blue"><span class="num blue ${r.ggBlue===0?'zero':''}">${r.ggBlue}</span></td>
      <td class="col-group-blue2"><span class="num blue ${r.kkBlue===0?'zero':''}">${r.kkBlue}</span></td>
      <td class="col-group-red"><span class="num red ${r.ggRed===0?'zero':''}">${r.ggRed}</span></td>
      <td class="col-group-red2"><span class="num red ${r.kkRed===0?'zero':''}">${r.kkRed}</span></td>
      <td><span class="num ${r.matches<10?'':'zero'}" style="color:var(--muted)">${r.matches}</span></td>
    </tr>
  `).join('');
}

function renderSummary() {
  const total = allRows.length;
  const totalM = allRows.reduce((a,r) => a+r.matches, 0);
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-chip">Champions: <span>${total}</span></div>
    <div class="summary-chip">Partidas: <span>${totalM}</span></div>
    <div class="summary-chip">Média KK🔴: <span>${total?(allRows.reduce((a,r)=>a+r.kkRed,0)/total).toFixed(1):0}</span></div>
    <div class="summary-chip">Média GG🔴: <span>${total?(allRows.reduce((a,r)=>a+r.ggRed,0)/total).toFixed(1):0}</span></div>
  `;
}
