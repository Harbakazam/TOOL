<div id="emptyMsg" class="empty" style="display:none">Nenhum dado encontrado.</div>

<script>
const PROXY = 'https://toolproxy.aikazamage.workers.dev';
let allRows = [];
let sortCol = 'kkRed';
let sortDir = -1;
let filterClass = 'all';
const cache = {};

function getApiKey() { return document.getElementById('apiKey').value.trim(); }
function getContestId() { return document.getElementById('contestId').value.trim(); }

function setStatus(msg, state='loading') {
  const bar = document.getElementById('statusBar');
  bar.style.display = 'flex';
  document.getElementById('statusDot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

function setProgress(pct, msg) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = msg;
}

function updateRate(headers) {
  const rem = headers.get('X-RateLimit-Remaining');
  const lim = headers.get('X-RateLimit-Limit');
  if (rem && lim) document.getElementById('rateInfo').textContent = `Rate: ${rem}/${lim} restantes`;
}

async function apiGet(path) {
  if (cache[path]) return cache[path];
  const res = await fetch(`${PROXY}?url=${encodeURIComponent(path)}`, {
    headers: { 'x-api-key': getApiKey() }
  });
  updateRate(res.headers);
  if (!res.ok) throw new Error(`HTTP ${res.status} em ${path}`);
  const data = await res.json();
  cache[path] = data;
  return data;
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loadData() {
  const apiKey = getApiKey();
  const contestId = getContestId();
  if (!apiKey || !contestId) { alert('Preencha a API key e o Contest ID'); return; }

  document.getElementById('loadBtn').disabled = true;
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('filtersBar').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('emptyMsg').style.display = 'none';
  Object.keys(cache).forEach(k => delete cache[k]);
  allRows = [];

  try {
    setStatus('Buscando informações do contest...', 'loading');
    setProgress(5, 'Buscando contest...');
    const contestData = await apiGet(`/contests/${contestId}`);
    let matchDate = new Date().toISOString().split('T')[0];
    if (contestData.startDate) matchDate = contestData.startDate.split('T')[0];
    else if (contestData.data && contestData.data.startDate) matchDate = contestData.data.startDate.split('T')[0];

    setStatus('Buscando 240 champions com stats...', 'loading');
    setProgress(10, 'Buscando champions...');
  const champMap = {};
let champPage = 1;
let champTotal = Infinity;
while (Object.keys(champMap).length < champTotal) {
  const champData = await apiGet(`/mokis?isChampion=true&limit=100&page=${champPage}`);
  champData.data.forEach(c => { champMap[c.mokiTokenId] = c; });
  champTotal = champData.pagination.total;
  if (champData.data.length < 100) break;
  champPage++;
  await sleep(300);
}
    setStatus('Buscando matchups do contest...', 'loading');
    setProgress(25, `Buscando partidas (data: ${matchDate})...`);
    const matchesData = await apiGet(`/contests/${contestId}/matches?matchDate=${matchDate}&limit=1200`);
    const matches = matchesData.data || [];

    setStatus('Identificando suportes únicos...', 'loading');
    setProgress(40, 'Coletando IDs dos suportes...');
    const supportIds = new Set();
    matches.forEach(m => {
      m.players.forEach(p => {
        if (!champMap[p.mokiTokenId]) supportIds.add(p.mokiId);
      });
    });

    const supportIdArr = Array.from(supportIds);
    const supportMap = {};
    const batchSize = 50;
    const batches = Math.ceil(supportIdArr.length / batchSize);

    for (let i = 0; i < batches; i++) {
      const batch = supportIdArr.slice(i * batchSize, (i + 1) * batchSize);
      const pct = 40 + Math.round((i / batches) * 38);
      setStatus(`Buscando stats suportes: lote ${i+1}/${batches}...`, 'loading');
      setProgress(pct, `Bulk suportes: lote ${i+1}/${batches}...`);
      try {
        const bulkData = await apiGet(`/mokis/bulk?ids=${batch.join(',')}`);
        bulkData.data.forEach(m => { supportMap[m.id] = m; });
      } catch(e) { console.warn('Bulk error:', e); }
      if (i < batches - 1) await sleep(350);
    }

    setStatus('Analisando partidas...', 'loading');
    setProgress(82, 'Cruzando dados...');

    const champMatches = {};
    matches.forEach(m => {
      m.players.forEach(p => {
        if (champMap[p.mokiTokenId]) {
          if (!champMatches[p.mokiTokenId]) champMatches[p.mokiTokenId] = [];
          champMatches[p.mokiTokenId].push({ match: m, champSide: p.team });
        }
      });
    });

    setProgress(90, 'Calculando scores...');
    allRows = [];

    for (const [champTokenId, matchList] of Object.entries(champMatches)) {
      const champ = champMap[parseInt(champTokenId)];
      if (!champ) continue;

      let gBlue=0, kBlue=0, gRed=0, kRed=0;
      let ggBlue=0, kkBlue=0, ggRed=0, kkRed=0;

      matchList.forEach(({ match, champSide }) => {
        const allies = match.players.filter(p => p.team === champSide);
        const enemies = match.players.filter(p => p.team !== champSide);

        const getMokiStats = (p) => {
          if (champMap[p.mokiTokenId]) return champMap[p.mokiTokenId]?.gameStats?.stats;
          return supportMap[p.mokiId]?.gameStats?.stats;
        };

        const classifyPlayer = (p, teamPlayers) => classify(p.class, getMokiStats(p), teamPlayers, p, champMap, supportMap);

        const allyClass = allies.map(p => classifyPlayer(p, allies));
        const enemyClass = enemies.map(p => classifyPlayer(p, enemies));

        const allyK = allyClass.filter(c => c === 'K').length;
        const allyG = allyClass.filter(c => c === 'G').length;
        const enemyK = enemyClass.filter(c => c === 'K').length;
        const enemyG = enemyClass.filter(c => c === 'G').length;

        if (allyG > 0) gBlue++;
        if (allyK > 0) kBlue++;
        if (enemyG > 0) gRed++;
        if (enemyK > 0) kRed++;

        ggBlue += allyG;
        kkBlue += allyK;
        ggRed += enemyG;
        kkRed += enemyK;
      });

      allRows.push({
        name: champ.name,
        class: champ.gameStats?.class || '?',
        gBlue, kBlue, gRed, kRed,
        ggBlue, kkBlue, ggRed, kkRed,
        matches: matchList.length
      });
    }

    setProgress(100, `Análise completa — ${allRows.length} champions`);
    setStatus(`✓ ${allRows.length} champions analisados | ${matches.length} partidas processadas`, 'done');
    renderSummary();
    renderTable();
    document.getElementById('filtersBar').style.display = 'flex';
    document.getElementById('summaryBar').style.display = 'flex';

  } catch(e) {
    setStatus('Erro: ' + e.message, 'error');
    console.error(e);
  }

  document.getElementById('loadBtn').disabled = false;
}

function classify(cls, stats, teammates, self, champMap, supportMap) {
  const str = stats?.strength?.total || 0;
  const dex = stats?.dexterity?.total || 0;
  const def = stats?.defense?.total || 0;
  const strTrain = stats?.strength?.training || 0;
  const strTotal = stats?.strength?.total || 1;

  if (cls === 'Striker') return 'G';
  if (cls === 'Bruiser') return 'K';
  if (cls === 'Grinder') return str > dex ? 'K' : 'G';

  if (cls === 'Sprinter') {
    if (dex > def) return 'G';
    const otherSprinters = teammates.filter(t => t !== self && t.class === 'Sprinter');
    if (otherSprinters.length > 0) {
      const allDefGtDex = otherSprinters.every(t => {
        const s = champMap[t.mokiTokenId]?.gameStats?.stats || supportMap[t.mokiId]?.gameStats?.stats;
        return (s?.defense?.total||0) > (s?.dexterity?.total||0);
      });
      if (allDefGtDex) return 'K';
    }
    const hasDefender = teammates.some(t => t !== self && t.class === 'Defender');
    if (hasDefender && def > dex) return 'K';
    const others = teammates.filter(t => t !== self);
    const gachas = others.filter(t => quickClassify(t.class, champMap[t.mokiTokenId]?.gameStats?.stats || supportMap[t.mokiId]?.gameStats?.stats) === 'G').length;
    if (gachas >= 2) return 'N';
    return 'N';
  }

  if (cls === 'Defender') {
    const others = teammates.filter(t => t !== self);
    if (others.some(t => t.class === 'Defender')) return 'K';
    const sprinters = others.filter(t => t.class === 'Sprinter');
    if (sprinters.length > 0) {
      const hasDefSprint = sprinters.some(t => {
        const s = champMap[t.mokiTokenId]?.gameStats?.stats || supportMap[t.mokiId]?.gameStats?.stats;
        return (s?.defense?.total||0) > (s?.dexterity?.total||0);
      });
      if (hasDefSprint) return 'K';
    }
    const gachas = others.filter(t => quickClassify(t.class, champMap[t.mokiTokenId]?.gameStats?.stats || supportMap[t.mokiId]?.gameStats?.stats) === 'G').length;
    if (gachas >= 2) return 'N';
    return 'N';
  }

  if (cls === 'Support') {
    const champPartner = teammates.find(t => t !== self && champMap[t.mokiTokenId]);
    if (champPartner) {
      if (champPartner.class === 'Defender') return 'K';
      if (champPartner.class === 'Striker') return 'G';
    }
    return 'N';
  }

  const generalistas = ['Forward','Anchor','Center','Flanker'];
  if (generalistas.includes(cls)) {
    const strRatio = strTrain / strTotal;
    if (strRatio >= 0.2 && str > dex) return 'K';
    return 'N';
  }

  return 'N';
}

function quickClassify(cls, stats) {
  if (cls === 'Striker') return 'G';
  if (cls === 'Bruiser') return 'K';
  const dex = stats?.dexterity?.total || 0;
  const str = stats?.strength?.total || 0;
  const def = stats?.defense?.total || 0;
  if (cls === 'Grinder') return str > dex ? 'K' : 'G';
  if (cls === 'Sprinter') return dex > def ? 'G' : 'N';
  return 'N';
}

function setFilter(cls, btn) {
  filterClass = cls;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  const cols = ['name','class','gBlue','kBlue','gRed','kRed','ggBlue','kkBlue','ggRed','kkRed'];
  document.querySelectorAll('th').forEach((th, i) => {
    th.classList.remove('sorted');
    const a = th.querySelector('.sort-arrow');
    if (a) a.textContent = '';
    if (cols[i] === col) {
      th.classList.add('sorted');
      if (a) a.textContent = sortDir === -1 ? ' ↓' : ' ↑';
    }
  });
  renderTable();
}

function renderTable() {
  let rows = [...allRows];
  if (filterClass !== 'all') rows = rows.filter(r => r.class === filterClass);
  rows.sort((a, b) => {
    const av = a[sortCol]; const bv = b[sortCol];
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });
  if (rows.length === 0) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }
  document.getElementById('tableWrap').style.display = 'block';
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('tableBody').innerHTML = rows.map(r => `
    <tr>
      <td><span class="champion-name">${r.name}</span></td>
      <td><span class="class-badge ${r.class}">${r.class}</span></td>
      <td class="col-group-blue"><span class="num blue ${r.gBlue===0?'zero':''}">${r.gBlue}</span></td>
      <td class="col-group-blue2"><span class="num blue ${r.kBlue===0?'zero':''}">${r.kBlue}</span></td>
      <td class="col-group-red"><span class="num red ${r.gRed===0?'zero':''}">${r.gRed}</span></td>
      <td class="col-group-red2"><span class="num red ${r.kRed===0?'zero':''}">${r.kRed}</span></td>
      <td class="col-group-blue"><span class="num blue ${r.ggBlue===0?'zero':''}">${r.ggBlue}</span></td>
      <td class="col-group-blue2"><span class="num blue ${r.kkBlue===0?'zero':''}">${r.kkBlue}</span></td>
      <td class="col-group-red"><span class="num red ${r.ggRed===0?'zero':''}">${r.ggRed}</span></td>
      <td class="col-group-red2"><span class="num red ${r.kkRed===0?'zero':''}">${r.kkRed}</span></td>
    </tr>
  `).join('');
}

function renderSummary() {
  const total = allRows.length;
  const totalMatches = allRows.reduce((a,r) => a+r.matches, 0);
  const avgKKRed = total ? (allRows.reduce((a,r) => a+r.kkRed, 0)/total).toFixed(1) : 0;
  const avgGGRed = total ? (allRows.reduce((a,r) => a+r.ggRed, 0)/total).toFixed(1) : 0;
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-chip">Champions: <span>${total}</span></div>
    <div class="summary-chip">Partidas: <span>${totalMatches}</span></div>
    <div class="summary-chip">Média KK🔴: <span>${avgKKRed}</span></div>
    <div class="summary-chip">Média GG🔴: <span>${avgGGRed}</span></div>
  `;
}
</script>
</body>
</html>
